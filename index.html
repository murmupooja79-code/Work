<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Project</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* Sleek dark slate background */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Navigation */
        header {
            background-color: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
        }

        header h1 {
            font-size: 1.5rem;
            color: #38bdf8; /* Vibrant blue accent */
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #38bdf8;
        }

        /* Main Content Container */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .card {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            max-width: 500px;
            width: 100%;
        }

        .card h2 {
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .card p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* Interactive Button */
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Footer */
        footer {
            background-color: #0f172a;
            text-align: center;
            padding: 1.5rem;
            color: #64748b;
            font-size: 0.875rem;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>

    <header>
        <h1>ProjectWorkspace</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <div class="card">
            <h2>Welcome to Your Site</h2>
            <p>This is a clean, responsive template ready for your custom features, interactive applications, or logic engines.</p>
            <button class="btn" id="actionBtn">Click Me</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ProjectWorkspace. Built with passion.</p>
    </footer>

    <script>
        // Simple interactivity example
        const button = document.getElementById('actionBtn');
        
        button.addEventListener('click', () => {
            alert('Button clicked! Your script is connected and working perfectly.');
        });
    </script>

</body>
</html>
